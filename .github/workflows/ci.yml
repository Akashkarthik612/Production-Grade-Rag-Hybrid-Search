name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest

      - name: Run tests
        env:
          PYTHONPATH: .
          PYTHONIOENCODING: utf-8
          RAG_COHERE_API_KEY: ${{ secrets.RAG_COHERE_API_KEY }}
        shell: pwsh
        run: |
          [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          python -m pytest -q -s tests/ci
          $status = $LASTEXITCODE
          if ($status -eq 5) {
            Write-Host "No tests collected yet. Placeholder test files are allowed."
            exit 0
          }
          exit $status

      - name: Upload query evaluation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: query-eval-artifacts
          path: |
            artifacts/query_eval_answers.json
            artifacts/ci_eval_chroma
          if-no-files-found: warn
